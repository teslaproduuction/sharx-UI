# Минимальный официальный сервер Hysteria 2 (apernet/hysteria), не Xray.
# Документация: https://v2.hysteria.network/docs/getting-started/Server/
#
# Сверяйте порт (UDP), пароль auth и TLS с тем, что ожидает ваш клиент (Xray outbound или hysteria client).

listen: :29192

tls:
  cert: /path/to/fullchain.pem
  key: /path/to/privkey.pem
  alpn:
    - h3

auth:
  type: password
  password: CHANGE_ME_SECRET

# Опционально: bandwidth, obfs (salamander), masquerade — см. Full Server Config у проекта.
