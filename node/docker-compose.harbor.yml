# Pre-built image; host network, API on :8080 by default
services:
  node:
    image: registry.konstpic.ru/sharx/sharxnode:latest
    container_name: sharx-node
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./bin:/app/bin
      - ./logs:/app/logs
      - ./cert:/app/cert
      - ./data:/app/data
    environment:
      PANEL_URL: "http://127.0.0.1:2053"
      SECRET_KEY: ""
