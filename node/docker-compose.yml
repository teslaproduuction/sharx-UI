# SharX node worker — host network; API default port 8080 (see node/defaults/defaults.go)
services:
  node:
    build:
      context: ..
      dockerfile: node/Dockerfile
    container_name: sharx-node
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./bin:/app/bin
      - ./logs:/app/logs
      - ./cert:/app/cert
      - ./data:/app/data
    environment:
      PANEL_URL: "http://192.168.0.47:2053"
      SECRET_KEY: ""
