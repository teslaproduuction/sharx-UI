[tutorial]
title = "Web Panel Menu Guide"
next = "Next"
prev = "Previous"
skip = "Skip"
finish = "Finish"
step = "Step"
of = "of"
dashboardTitle = "1. Panel"
dashboardDesc = """
Main interface for managing the entire system. Through the panel we:\r
\r
• Configure and control nodes (servers with xray)\r
• Manage clients\r
• Configure inbounds"""
dashboardHint = "Panel is the control center. Here you create nodes, inbounds and assign clients."
nodeTitle = "2. Node"
nodeDesc = "Separate Xray core with API for communication with the panel. The node handles connections and serves as the 'brain' for inbounds."
nodeHint = "Node is the server core. The panel communicates with it via API to manage configs and connections."
inboundTitle = "3. Inbound"
inboundDesc = """
Configuration or profile for a node.\r
\r
• Creates a connection to a node\r
• Subscribes to one or more nodes"""
inboundHint = "Inbound is a connection profile. Through it, clients get access to the required nodes."
clientTitle = "4. Client"
clientDesc = """
System user who can be assigned one or more inbounds.\r
\r
For example:\r
• Inbound 1 → whitelist node\r
• Inbound 2 → regular foreign server\r
\r
Client can use any or all inbounds assigned to them"""
clientHint = "Client is a user. Assign inbounds to them so they can connect to the required nodes."
hostTitle = "5. Hosts"
hostDesc = """
External addresses for connection.\r
\r
• Proxy balancer that hides direct node addresses\r
• Can distribute load between multiple nodes\r
• Replace node address with the required host in inbound\r
\r
Example:\r
Inbound connects to a balancer host, which then distributes the connection to real nodes"""
hostHint = "Hosts are virtual addresses. Use them for load balancing and hiding real servers."
settingsTitle = "6. Panel Settings"
settingsDesc = """
Section for general panel configuration.\r
\r
• Enable/disable various features\r
• Configure panel appearance and behavior"""
settingsHint = "Panel Settings — here you can manage features and panel configuration."
xrayTitle = "7. Xray Configuration"
xrayDesc = """
Section for fine-tuning Xray core.\r
\r
• Routing\r
• Connection parameters and traffic routing\r
• Additional advanced node configs"""
xrayHint = "Xray Configuration — for advanced core configuration, routing management and other node parameters."

