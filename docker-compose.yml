# Public subscription page is served by SharX itself: /panel/sub/?id=<subId> (Next static export).
# Set XUI_WEB_DOMAIN (and TLS env vars if needed) so user-facing links resolve to the panel host.
# VPN clients use the subscription port (e.g. 2096) for raw configs; browsers hitting the sub URL
# with Accept: text/html are redirected to the first-party page unless ?legacy=1 is set.
services:
  sharx:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: sharx_app
    # hostname: yourhostname
    ports:
      - "2053:2053"   # Web UI
      - "2096:2096"   # Subscriptions
    #   - "443:443"     # Inbound
    volumes:
      - $PWD/db/:/etc/x-ui/
      - $PWD/cert/:/root/cert/
      - $PWD/data/:/app/data/  # Data folder for core state and geo files
      # Do not mount ./bin unless you supply xray-linux-* yourself. An empty host dir hides
      # the binaries baked into the image and causes: fork/exec /app/bin/xray-linux-arm64: no such file
      # - $PWD/bin/:/app/bin/
    environment:
      # Xray настройки
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
      # Paths
      XUI_DATA_FOLDER: "/app/data"
      XUI_BIN_FOLDER: "/app/bin"
      # Панель на корне сайта (см. GetBasePath); без подпути не будет 302/404 на GET http://host:2053/
      XUI_WEB_BASE_PATH: "/"
      # XUI_WEB_CERT_FILE:  /cert/fullchain.pem
      # XUI_WEB_KEY_FILE: /cert/privkey.pem
      # XUI_WEB_DOMAIN: panel.example.com
      # XUI_WEB_PORT: 8443
      
      # PostgreSQL настройки
      XUI_DB_HOST: postgres
      XUI_DB_PORT: 5432
      XUI_DB_USER: xui_user
      XUI_DB_PASSWORD: change_this_password
      XUI_DB_NAME: xui_db
      XUI_DB_SSLMODE: disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sharx_network
    tty: true
#    network_mode: host
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: sharx_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: xui_user
      POSTGRES_PASSWORD: change_this_password
      POSTGRES_DB: xui_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sharx_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U xui_user -d xui_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  sharx_network:
    driver: bridge

volumes:
  postgres_data:
