# Public subscription page is served by SharX itself: /panel/sub/?id=<subId> (Next static export).
# Set XUI_WEB_DOMAIN (and TLS env vars if needed) so user-facing links resolve to the panel host.
# VPN clients use the subscription port (e.g. 2096) for raw configs; browsers hitting the sub URL
# with Accept: text/html are redirected to the first-party page unless ?legacy=1 is set.
#
# In-stack updater: Watchtower shares sharx_network only (no host ports). The panel calls
# http://watchtower:8080/v1/update with the same token. If WATCHTOWER_HTTP_API_TOKEN is unset, a dev-only
# default is used so `docker compose up` works; for production set it in .env (e.g. openssl rand -hex 24).
# Image: beatkind/watchtower (containrrr image breaks on Docker Engine 29+: API 1.44 minimum).
# Docs: https://github.com/beatkind/watchtower
services:
  # sharx: dev uses `build:` so the local image is named e.g. `sharx-code-sharx` (project_service).
  # Watchtower pulls by image name; that name is not a registry path — Docker falls back to Docker Hub
  # (`library/sharx-code-sharx`) and pull fails. For in-panel/Watchtower updates, use a Harbor image
  # instead: comment out `build` and set e.g. `image: registry.konstpic.ru/sharx/sharx:1.1.2`, then
  # `docker login registry.konstpic.ru` and recreate the container.
  sharx:
    build:
      context: .
      dockerfile: ./Dockerfile
    container_name: sharx_app
    labels:
      com.centurylinklabs.watchtower.enable: "true"
    # hostname: yourhostname
    # For "kick user" (conntrack drop) in single-node mode, grant network admin to the app container:
    cap_add: [NET_ADMIN]
    network_mode: host    # ports:
 #   ports:
 #     - "2053:2053"   # Web UI
 #     - "2096:2096"   # Subscriptions
    #   - "443:443"     # Inbound
    volumes:
      - $PWD/db/:/etc/x-ui/
      - $PWD/cert/:/root/cert/
      - $PWD/data/:/app/data/  # Data folder for core state and geo files
      # Do not mount ./bin unless you supply xray-linux-* yourself. An empty host dir hides
      # the binaries baked into the image and causes: fork/exec /app/bin/xray-linux-arm64: no such file
      # - $PWD/bin/:/app/bin/
    environment:
      # Xray настройки
      XRAY_VMESS_AEAD_FORCED: "false"
      XUI_ENABLE_FAIL2BAN: "true"
      # Paths
      XUI_DATA_FOLDER: "/app/data"
      XUI_BIN_FOLDER: "/app/bin"
      # Панель на корне сайта (см. GetBasePath); без подпути не будет 302/404 на GET http://host:2053/
      XUI_WEB_BASE_PATH: "/"
      # XUI_WEB_CERT_FILE:  /cert/fullchain.pem
      # XUI_WEB_KEY_FILE: /cert/privkey.pem
      # XUI_WEB_DOMAIN: panel.example.com
      XUI_WEB_PORT: 2053
      
      # PostgreSQL: при network_mode: host контейнер не в sharx_network — имя postgres не резолвится.
      # Порт БД проброшен на хост (5432:5432), подключайтесь к 127.0.0.1.
      XUI_DB_HOST: 127.0.0.1
      XUI_DB_PORT: 5432
      XUI_DB_USER: xui_user
      XUI_DB_PASSWORD: change_this_password
      XUI_DB_NAME: xui_db
      XUI_DB_SSLMODE: disable
      # Host network: use localhost — watchtower публикуется только на 127.0.0.1:8081 (см. сервис watchtower).
      XUI_DOCKER_UPDATER_URL: http://127.0.0.1:8081/v1/update
      XUI_DOCKER_UPDATER_TOKEN: ${WATCHTOWER_HTTP_API_TOKEN:-local-dev-insecure-watchtower-token}
    depends_on:
      postgres:
        condition: service_healthy
      watchtower:
        condition: service_started
    # networks:
    #   - sharx_network
    tty: true
#    network_mode: host
    restart: unless-stopped

  watchtower:
    image: beatkind/watchtower:2.3.2
    container_name: sharx_watchtower
    # Только для panel с network_mode: host — иначе панель не достучится до watchtower по имени сервиса.
    ports:
      - "127.0.0.1:8081:8080"
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command:
      - --http-api-update
    environment:
      WATCHTOWER_HTTP_API_TOKEN: ${WATCHTOWER_HTTP_API_TOKEN:-local-dev-insecure-watchtower-token}
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_CLEANUP: "true"
    labels:
      com.centurylinklabs.watchtower.enable: "false"
    networks:
      - sharx_network

  postgres:
    image: postgres:16-alpine
    container_name: sharx_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: xui_user
      POSTGRES_PASSWORD: change_this_password
      POSTGRES_DB: xui_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sharx_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U xui_user -d xui_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  sharx_network:
    driver: bridge

volumes:
  postgres_data:
